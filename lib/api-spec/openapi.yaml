openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification for PvP Tier List
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: players
    description: Player tier rankings
  - name: leaderboard
    description: Leaderboard and stats

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /players:
    get:
      operationId: listPlayers
      tags: [players]
      summary: List all players
      parameters:
        - in: query
          name: gameMode
          schema:
            type: string
            enum: [overall, vanilla, uhc, pot, nethop, smp, sword, axe, mace]
          description: Filter by game mode
        - in: query
          name: region
          schema:
            type: string
            enum: [NA, EU, AS, SA, OC]
          description: Filter by region
        - in: query
          name: search
          schema:
            type: string
          description: Search players by username
      responses:
        "200":
          description: List of players
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Player"

    post:
      operationId: createPlayer
      tags: [players]
      summary: Create a player
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePlayerBody"
      responses:
        "201":
          description: Created player
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Player"

  /players/{id}:
    get:
      operationId: getPlayer
      tags: [players]
      summary: Get player by ID
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Player details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Player"
        "404":
          description: Player not found

    put:
      operationId: updatePlayer
      tags: [players]
      summary: Update a player
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePlayerBody"
      responses:
        "200":
          description: Updated player
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Player"

    delete:
      operationId: deletePlayer
      tags: [players]
      summary: Delete a player
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /leaderboard:
    get:
      operationId: getLeaderboard
      tags: [leaderboard]
      summary: Get top players leaderboard
      parameters:
        - in: query
          name: gameMode
          schema:
            type: string
            enum: [overall, vanilla, uhc, pot, nethop, smp, sword, axe, mace]
          description: Game mode filter
        - in: query
          name: limit
          schema:
            type: integer
            default: 50
          description: Number of results
      responses:
        "200":
          description: Ranked leaderboard
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LeaderboardEntry"

  /stats/summary:
    get:
      operationId: getStatsSummary
      tags: [leaderboard]
      summary: Get site stats summary
      responses:
        "200":
          description: Stats summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatsSummary"

  /stats/tier-distribution:
    get:
      operationId: getTierDistribution
      tags: [leaderboard]
      summary: Get player count by tier
      parameters:
        - in: query
          name: gameMode
          schema:
            type: string
            enum: [overall, vanilla, uhc, pot, nethop, smp, sword, axe, mace]
      responses:
        "200":
          description: Tier distribution
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TierDistributionEntry"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    TierRatings:
      type: object
      description: Tier ratings per game mode. Each value is a tier string (HT1, HT2, HT3, LT1, LT2, LT3, LT4, Unranked)
      properties:
        overall:
          type: string
          nullable: true
        vanilla:
          type: string
          nullable: true
        uhc:
          type: string
          nullable: true
        pot:
          type: string
          nullable: true
        nethop:
          type: string
          nullable: true
        smp:
          type: string
          nullable: true
        sword:
          type: string
          nullable: true
        axe:
          type: string
          nullable: true
        mace:
          type: string
          nullable: true

    Player:
      type: object
      required:
        - id
        - username
        - points
        - rank
        - region
        - rankTitle
        - tiers
      properties:
        id:
          type: integer
        username:
          type: string
        points:
          type: integer
        rank:
          type: integer
        region:
          type: string
        rankTitle:
          type: string
          description: "Combat title: Combat Grandmaster, Combat Master, Combat Ace, etc."
        avatarUrl:
          type: string
          nullable: true
        tiers:
          $ref: "#/components/schemas/TierRatings"
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    CreatePlayerBody:
      type: object
      required:
        - username
        - points
        - region
        - rankTitle
        - tiers
      properties:
        username:
          type: string
        points:
          type: integer
        region:
          type: string
        rankTitle:
          type: string
        avatarUrl:
          type: string
          nullable: true
        tiers:
          $ref: "#/components/schemas/TierRatings"

    LeaderboardEntry:
      type: object
      required:
        - rank
        - player
        - score
      properties:
        rank:
          type: integer
        player:
          $ref: "#/components/schemas/Player"
        score:
          type: integer

    StatsSummary:
      type: object
      required:
        - totalPlayers
        - totalRanked
        - topRegion
        - recentlyUpdated
      properties:
        totalPlayers:
          type: integer
        totalRanked:
          type: integer
        topRegion:
          type: string
        recentlyUpdated:
          type: integer

    TierDistributionEntry:
      type: object
      required:
        - tier
        - count
      properties:
        tier:
          type: string
        count:
          type: integer
